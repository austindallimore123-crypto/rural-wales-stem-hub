<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities | Rural Wales STEM Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .tail-container { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col tail-container text-slate-900">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm font-sans relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20 relative">
                <div class="flex items-center justify-start z-20">
                    <a href="index.html" class="text-xl sm:text-2xl font-bold text-slate-900 flex items-center gap-2.5">
                        <i class="fa-solid fa-atom text-emerald-600"></i>
                        <span class="whitespace-nowrap">Rural Wales <span class="text-emerald-600">STEM Hub</span></span>
                    </a>
                </div>
                
                <div class="hidden lg:flex absolute inset-x-0 top-0 h-full justify-center pointer-events-none z-10">
                    <div class="flex items-center space-x-7 h-full pointer-events-auto">
                        <a href="index.html" class="text-slate-600 hover:text-slate-900 font-semibold text-base transition">Home</a>
                        <a href="opportunities.html" class="text-emerald-600 font-bold text-base h-full flex items-center border-b-2 border-emerald-600">Opportunities</a>
                        <a href="timeline.html" class="text-slate-600 hover:text-slate-900 font-semibold text-base transition">Timeline</a>
                        <a href="guides.html" class="text-slate-600 hover:text-slate-900 font-semibold text-base transition">Guides</a>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 z-20">
                    <button id="lang-toggle" onclick="toggleLanguage()" class="hidden md:inline-flex bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-4 py-2 rounded-lg text-sm border border-slate-200 transition">
                        🏴󠁧󠁢󠁷󠁬󠁳󠁿 Cymraeg
                    </button>
                    <button class="text-slate-600 hover:text-slate-900 lg:hidden focus:outline-none p-2 rounded-xl bg-slate-50">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-slate-200 pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 id="page-title" class="text-4xl font-black text-slate-950 mb-3 tracking-tight">Live Opportunities</h1>
            <p id="page-subtitle" class="text-lg text-slate-500 mb-8 max-w-2xl font-medium">Filter and find the perfect STEM pathway tailored for your exact location and year group.</p>
            
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col md:flex-row gap-4 items-center shadow-inner">
                
                <div class="w-full md:w-1/3 relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="Search keywords..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 font-medium">
                </div>

                <select id="region-filter" class="w-full md:w-1/5 py-3 px-4 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 font-medium bg-white text-slate-700 cursor-pointer">
                    <option value="">All Regions</option>
                    <option value="North Wales">North Wales</option>
                    <option value="South Wales">South Wales</option>
                    <option value="West Wales">West Wales</option>
                    <option value="Mid Wales">Mid Wales / Borders</option>
                    <option value="Remote">UK-Wide / Remote</option>
                </select>

                <select id="year-filter" class="w-full md:w-1/5 py-3 px-4 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 font-medium bg-white text-slate-700 cursor-pointer">
                    <option value="">All Years</option>
                    <option value="11">Year 11</option>
                    <option value="12">Year 12</option>
                    <option value="13">Year 13</option>
                </select>

                <button onclick="renderGrid()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-8 py-3 rounded-xl shadow-md transition whitespace-nowrap" id="search-btn">
                    Filter Results
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <div id="loading-state" class="text-center py-20 text-slate-400 font-medium">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-emerald-500 mb-4"></i>
            <p>Fetching live database...</p>
        </div>

        <div id="opportunities-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            </div>
        
        <div id="no-results" class="hidden text-center py-20">
            <div class="w-20 h-20 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-regular fa-folder-open"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2" id="no-res-title">No matching opportunities</h3>
            <p class="text-slate-500" id="no-res-sub">Try adjusting your region or year group filters.</p>
        </div>
    </main>

    <script>
        // 1. Welsh/English Dictionary
        let currentLang = 'en';
        const dict = {
            en: {
                pageTitle: "Live Opportunities",
                pageSubtitle: "Filter and find the perfect STEM pathway tailored for your exact location and year group.",
                btnCymraeg: "🏴󠁧󠁢󠁷󠁬󠁳󠁿 Cymraeg",
                searchBtn: "Filter Results",
                placeholder: "Search keywords...",
                allRegions: "All Regions",
                allYears: "All Years",
                closingSoon: "Closing Soon",
                daysLeft: "days left",
                rolling: "Rolling",
                closed: "Closed",
                noResTitle: "No matching opportunities",
                noResSub: "Try adjusting your region or year group filters.",
                saveBtn: "Save to Timeline"
            },
            cy: {
                pageTitle: "Cyfleoedd Byw",
                pageSubtitle: "Hidlo a dod o hyd i'r llwybr STEM perffaith wedi'i deilwra ar gyfer eich lleoliad a'ch blwyddyn unigol.",
                btnCymraeg: "🇬🇧 English",
                searchBtn: "Hidlo Canlyniadau",
                placeholder: "Chwilio geiriau allweddol...",
                allRegions: "Pob Rhanbarth",
                allYears: "Pob Blwyddyn",
                closingSoon: "Cau Cyn Bo Hir",
                daysLeft: "diwrnod yn ôl",
                rolling: "Treigl",
                closed: "Ar Gau",
                noResTitle: "Dim cyfleoedd yn cyfateb",
                noResSub: "Ceisiwch addasu eich hidlwyr rhanbarth neu flwyddyn.",
                saveBtn: "Cadw i'r Llinell Amser"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'cy' : 'en';
            document.getElementById('lang-toggle').innerText = dict[currentLang].btnCymraeg;
            document.getElementById('page-title').innerText = dict[currentLang].pageTitle;
            document.getElementById('page-subtitle').innerText = dict[currentLang].pageSubtitle;
            document.getElementById('search-btn').innerText = dict[currentLang].searchBtn;
            document.getElementById('search-input').placeholder = dict[currentLang].placeholder;
            document.getElementById('region-filter').options[0].text = dict[currentLang].allRegions;
            document.getElementById('year-filter').options[0].text = dict[currentLang].allYears;
            document.getElementById('no-res-title').innerText = dict[currentLang].noResTitle;
            document.getElementById('no-res-sub').innerText = dict[currentLang].noResSub;
            renderGrid(); // Re-render grid to update badge languages
        }

        // 2. Intelligent Deadline Logic
        function calculateDeadlineBadge(deadlineStr) {
            if (!deadlineStr || deadlineStr.trim() === '') return `<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-xs font-bold">TBC</span>`;
            if (deadlineStr.toLowerCase() === 'rolling') return `<span class="bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-rotate mr-1"></i>${dict[currentLang].rolling}</span>`;

            // Parse DD/MM/YYYY into a standard JS Date
            const parts = deadlineStr.split(/[-/]/);
            let dateObj = new Date(deadlineStr);
            if (parts.length === 3 && parts[0].length <= 2) {
                dateObj = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); // Convert DD/MM/YYYY to YYYY-MM-DD
            }

            if (isNaN(dateObj.getTime())) return `<span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-bold">${deadlineStr}</span>`;

            const today = new Date();
            const daysDifference = Math.ceil((dateObj - today) / (1000 * 60 * 60 * 24));

            if (daysDifference < 0) {
                return `<span class="bg-slate-100 text-slate-400 border border-slate-200 px-2 py-1 rounded text-xs font-bold line-through">${dict[currentLang].closed}</span>`;
            } else if (daysDifference <= 14) {
                return `<span class="bg-orange-50 text-orange-700 border border-orange-200 px-2 py-1 rounded text-xs font-bold animate-pulse"><i class="fa-solid fa-fire mr-1"></i>${dict[currentLang].closingSoon} (${daysDifference} ${dict[currentLang].daysLeft})</span>`;
            } else {
                return `<span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-2 py-1 rounded text-xs font-bold"><i class="fa-regular fa-calendar mr-1"></i>${dateObj.toLocaleDateString('en-GB')}</span>`;
            }
        }

        // 3. Database Fetch & Render Logic
        const sheetCSVUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSyvn7qSCsr734NAvG_1QTR1rP6Cb_WwJfE5UW1hXAEhG99a8LHygnKwAYaL2Q0EiOeUkGpdbZKWKN/pub?output=csv";
        let globalData = [];

        document.addEventListener("DOMContentLoaded", () => {
            Papa.parse(sheetCSVUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    globalData = results.data.filter(item => item.Title && item.Title.trim() !== "");
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('opportunities-grid').classList.remove('hidden');
                    renderGrid();
                }
            });
        });

        function renderGrid() {
            const grid = document.getElementById('opportunities-grid');
            const noRes = document.getElementById('no-results');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterRegion = document.getElementById('region-filter').value;
            const filterYear = document.getElementById('year-filter').value;

            grid.innerHTML = '';

            const filteredData = globalData.filter(item => {
                const textMatch = (item.Title || '').toLowerCase().includes(searchTerm) || (item.Description || '').toLowerCase().includes(searchTerm);
                const regionMatch = filterRegion === "" || (item.Region && item.Region.includes(filterRegion));
                const yearMatch = filterYear === "" || (item.YearGroup && item.YearGroup.includes(filterYear));
                return textMatch && regionMatch && yearMatch;
            });

            if (filteredData.length === 0) {
                grid.classList.add('hidden');
                noRes.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                noRes.classList.add('hidden');

                filteredData.forEach(item => {
                    const firstLetter = item.Title.charAt(0).toUpperCase();
                    const deadlineBadgeHTML = calculateDeadlineBadge(item.Deadline);
                    const regionTag = item.Region ? `<span class="text-slate-500 text-xs font-semibold mr-3"><i class="fa-solid fa-location-dot mr-1"></i>${item.Region}</span>` : '';
                    
                    const cardHTML = `
                        <div class="bg-white rounded-3xl p-7 shadow-sm border border-slate-200 hover:shadow-xl hover:border-emerald-300 transition-all duration-300 flex flex-col h-full group">
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center text-xl font-black shadow-inner">
                                    ${firstLetter}
                                </div>
                                <div class="text-right flex flex-col items-end gap-2">
                                    ${deadlineBadgeHTML}
                                </div>
                            </div>
                            
                            <div class="mb-4 flex-grow">
                                <p class="text-emerald-600 text-[10px] font-extrabold uppercase tracking-widest mb-1.5">${item.Category || 'Opportunity'}</p>
                                <h3 class="text-xl font-black text-slate-900 leading-tight mb-2 group-hover:text-emerald-700 transition-colors">${item.Title}</h3>
                                <p class="text-slate-500 text-sm line-clamp-3">${item.Description}</p>
                            </div>
                            
                            <div class="mt-auto border-t border-slate-100 pt-5">
                                <div class="flex items-center mb-4">
                                    ${regionTag}
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="alert('Saved to timeline!')" class="w-1/4 flex items-center justify-center bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-400 hover:text-emerald-600 py-2.5 rounded-xl transition tooltip" title="Save">
                                        <i class="fa-regular fa-bookmark text-lg"></i>
                                    </button>
                                    <a href="${item.Link || '#'}" target="_blank" class="w-3/4 text-center bg-slate-900 hover:bg-slate-800 text-white text-sm font-bold py-2.5 rounded-xl transition shadow-md">
                                        Apply Now <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs text-slate-300"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
        }
    </script>
</body>
</html>
