<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Wales STEM Hub | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; }
        
        /* Futuristic Background Grid */
        .bg-cyber-grid {
            background-color: #020617;
            background-image: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        /* Scrolling Ticker Animation */
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-cyber-grid min-h-screen flex flex-col text-slate-300 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="bg-cyan-900/40 border-b border-cyan-500/30 text-cyan-300 text-xs font-bold py-2">
        <div class="max-w-7xl mx-auto px-4 overflow-hidden flex items-center">
            <span class="bg-cyan-500 text-slate-950 px-2 py-0.5 rounded text-[10px] uppercase mr-3 shrink-0 z-10 shadow-[0_0_10px_rgba(6,182,212,0.5)]">Live</span>
            <div class="ticker-wrap">
                <div class="ticker-move">
                    🚀 NEW: Airbus Degree Apprenticeship Added &nbsp;&nbsp;|&nbsp;&nbsp; ⚡ CLOSING SOON: Sutton Trust Summer School (2 days left) &nbsp;&nbsp;|&nbsp;&nbsp; 🏆 CyberFirst Bursary Scheme now open for Welsh applicants!
                </div>
            </div>
        </div>
    </div>

    <nav class="glass-panel sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex items-center justify-start z-20">
                    <a href="index.html" class="text-xl sm:text-2xl font-bold text-white flex items-center gap-2.5">
                        <i class="fa-solid fa-network-wired text-cyan-400"></i>
                        <span class="tracking-tight">STEM<span class="text-cyan-400 font-light">Hub</span>.Wales</span>
                    </a>
                </div>
                
                <div class="hidden lg:flex absolute inset-x-0 top-0 h-full justify-center pointer-events-none z-10">
                    <div class="flex items-center space-x-8 h-full pointer-events-auto">
                        <a href="index.html" class="text-cyan-400 font-bold text-sm uppercase tracking-widest h-full flex items-center border-b-2 border-cyan-400 shadow-[0_2px_10px_rgba(6,182,212,0.3)]">Portal</a>
                        <a href="opportunities.html" class="text-slate-400 hover:text-white font-semibold text-sm uppercase tracking-widest transition">Database</a>
                        <a href="timeline.html" class="text-slate-400 hover:text-white font-semibold text-sm uppercase tracking-widest transition">Timeline</a>
                        <a href="guides.html" class="text-slate-400 hover:text-white font-semibold text-sm uppercase tracking-widest transition">Strategy</a>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 z-20 pointer-events-auto">
                    <button id="auth-btn" onclick="openOnboarding()" class="hidden lg:inline-flex items-center gap-2 bg-transparent border border-cyan-500/50 hover:bg-cyan-500/10 text-cyan-300 font-bold px-5 py-2 rounded-lg text-sm transition">
                        <i class="fa-regular fa-user"></i> <span id="auth-text">Initialize Profile</span>
                    </button>
                    <button class="text-cyan-400 hover:text-white lg:hidden focus:outline-none p-2">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-center items-center px-4 py-16 w-full relative z-10">
        
        <div class="text-center mb-8">
            <p id="greeting-text" class="text-cyan-400 font-bold tracking-widest uppercase text-sm mb-2 drop-shadow-[0_0_8px_rgba(6,182,212,0.5)]">System Initialized</p>
            <h1 class="text-4xl md:text-6xl font-bold text-white tracking-tighter leading-tight">
                Welcome to the <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Next Generation.</span>
            </h1>
        </div>

        <div class="glass-panel p-2 md:p-3 rounded-3xl md:rounded-full shadow-2xl flex flex-col md:flex-row items-center gap-2 max-w-4xl mx-auto w-full mb-12">
            
            <div class="w-full md:w-2/5 relative flex items-center px-4 py-3 md:py-2 border-b md:border-b-0 md:border-r border-slate-700">
                <i class="fa-solid fa-terminal text-cyan-500 mr-3"></i>
                <input type="text" placeholder="Search criteria..." class="w-full focus:outline-none text-white font-medium bg-transparent placeholder-slate-500">
            </div>
            
            <div class="w-full md:w-1/4 relative flex items-center px-4 py-3 md:py-2 border-b md:border-b-0 md:border-r border-slate-700">
                <i class="fa-solid fa-satellite-dish text-cyan-500 mr-3"></i>
                <select class="w-full focus:outline-none text-slate-300 font-medium bg-transparent appearance-none cursor-pointer">
                    <option class="bg-slate-900" value="">Global / All</option>
                    <option class="bg-slate-900" value="North Wales">North Wales</option>
                    <option class="bg-slate-900" value="South Wales">South Wales</option>
                </select>
            </div>

            <button class="w-full md:w-auto bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-4 md:py-3 px-8 rounded-2xl md:rounded-full transition-all flex-shrink-0 shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]">
                Query Database
            </button>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('hub_userName');
            const userYear = localStorage.getItem('hub_userYear');
            
            if (userName) {
                // Fakes the login state
                document.getElementById('greeting-text').innerHTML = `<i class="fa-solid fa-circle-check mr-1 text-emerald-400"></i> Welcome back, ${userName} (Year ${userYear})`;
                document.getElementById('auth-text').innerText = "Dashboard Active";
            }
        });

        function openOnboarding() {
            // Very simple prompt for the MVP, we can build a beautiful modal for this next!
            const name = prompt("Enter your first name to initialize your local dashboard:");
            if (name) {
                const year = prompt("What Year Group are you in? (e.g. 11, 12, 13)");
                localStorage.setItem('hub_userName', name);
                localStorage.setItem('hub_userYear', year);
                location.reload();
            }
        }
    </script>
</body>
</html>
